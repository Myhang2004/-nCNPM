{% extends 'app/base.html' %}
{% load static %}

{% block main-content %}

<style>
    .detail-wrapper {
        max-width: 1200px;
        margin: 50px auto;
        padding: 0 20px;
    }

    .detail-card {
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        padding: 30px;
    }

    .detail-image-box {
        background: #f8f8f8;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
    }

    .detail-image-box img {
        width: 100%;
        max-width: 420px;
        height: 420px;
        object-fit: cover;
        border-radius: 18px;
    }

    .detail-info {
        padding: 10px 10px 10px 30px;
    }

    .detail-name {
        font-size: 28px;
        font-weight: 700;
        color: #222;
        margin-bottom: 16px;
        line-height: 1.4;
    }

    .detail-price {
        font-size: 30px;
        font-weight: bold;
        color: #D99485;
        margin-bottom: 20px;
    }

    .detail-label {
        font-size: 18px;
        font-weight: 600;
        color: #333;
        margin-top: 25px;
        margin-bottom: 10px;
    }

    .detail-desc {
        font-size: 16px;
        color: #555;
        line-height: 1.8;
    }

    .detail-actions {
        margin-top: 25px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .add-btn {
        background-color: #D99485;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        font-weight: 600;
        transition: 0.3s;
    }

    .add-btn:hover {
        background-color: #c87d6d;
        color: white;
    }

    .back-btn {
        background: #f3f3f3;
        color: #333;
        border-radius: 12px;
        padding: 12px 24px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
        display: inline-block;
    }

    .back-btn:hover {
        background: #e7e7e7;
        color: #000;
    }
</style>

<div class="detail-wrapper">
    <div class="detail-card">
        <div class="row align-items-center">
            
            <div class="col-md-6 mb-4 mb-md-0">
                <div class="detail-image-box">
                    <img id="main-image" src="{{ product.ImageURL }}" alt="{{ product.name }}">
                </div>
            </div>

            <div class="col-md-6">
                <div class="detail-info">
                    <h2 class="detail-name">{{ product.name }}</h2>

                    <div class="detail-price">
                        {{ product.display_price_vn }} VND
                    </div>

                    <div class="detail-actions">
                        <button 
                            data-product="{{ product.id }}" 
                            data-action="add" 
                            class="btn add-btn update-cart">
                            Thêm giỏ hàng
                        </button>

                        <a href="{% url 'home' %}" class="back-btn">Quay lại</a>
                    </div>

                    <div class="detail-label">Mô tả</div>
                    <p class="detail-desc">{{ product.detail }}</p>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
