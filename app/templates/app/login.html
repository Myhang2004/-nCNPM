{% extends 'app/base.html' %}
{% load static %}
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
</head>
<body>
{% block register %}
<section class="vh-100 bg-image"
  style="background-image: url('https://i.pinimg.com/1200x/c3/ab/cb/c3abcbd1eb2eebdc0dbefa6b53f5d1b9.jpg');">
  <div class="mask d-flex align-items-center h-100 gradient-custom-3">
    <div class="container h-100">
      <div class="row d-flex justify-content-end align-items-center h-100">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card" style="border-radius: 15px;">
            <div class="card-body p-5">
              <img src="https://inkythuatso.com/uploads/images/2021/12/logo-truong-dai-hoc-kien-truc-da-nang-inkythuatso-01-25-15-05-26.jpg" width="100px" height="100px" style="display: block; margin: 0 auto;" alt="Logo Trường Đại học Kiến Trúc Đà Nẵng">
              <h2 class="text-uppercase text-center mb-5">Đăng nhập</h2>
              
              <form method="POST" action="">
               {% csrf_token %}
               
                <!-- User Name -->
                <div class="form-outline mb-4">
                  <label class="form-label" for="username">Tên người dùng</label>
                  <input type="text" name="username" id="username" class="form-control form-control-lg" />
                </div>

                <!-- Password -->
                <div class="form-outline mb-4">
                  <label class="form-label" for="password">Mật khẩu</label>
                  <input type="password" name="password" id="password" class="form-control form-control-lg" />
                </div>

                <div class="d-flex justify-content-center">
                  <button type="submit" class="btn btn-success btn-block btn-lg gradient-custom-4 text-body" style="background-color: #D99485;">Đăng nhập</button>
                </div>
                
                <p class="text-center text-muted mt-5 mb-0">Bạn chưa có tài khoản? <a href="{% url 'register' %}" style="text-decoration: none; color: black;">Đăng kí</a></p>

                {% for message in messages %}
                <p id="message" class="text-center text-muted mt-5 mb-0">{{ message }}</p>
                {% endfor %}
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="" async defer></script>
{% endblock %}

</body>
</html>
